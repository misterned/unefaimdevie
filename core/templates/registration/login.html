{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<h1 class="h3 section-title">Connexion animateur</h1>
<p class="text-muted">Accès réservé aux animateurs et à l'administration.</p>
<form method="post" class="card card-body" style="max-width: 480px;">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Se connecter</button>
</form>
{% endblock %}
