{% extends 'base.html' %}

{% block title %}Édition article - Une faim de vie au Croisic{% endblock %}

{% block content %}
<h1 class="h3 mb-4">Créer / modifier un article</h1>
<form method="post" enctype="multipart/form-data" class="card card-body">

</form>
{% endblock %}
