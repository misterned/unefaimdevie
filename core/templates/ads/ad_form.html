{% extends 'base.html' %}

{% block title %}Soumettre une publicité{% endblock %}

{% block content %}
<h1 class="h3 mb-4">Espace commerçant</h1>
<p class="text-muted">Soumettez votre publicité. Elle sera validée avant publication.</p>
<form method="post" enctype="multipart/form-data" class="card card-body">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Envoyer</button>
</form>
{% endblock %}
