# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Deploy Azure App Service
run-name: Deploy Azure (${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || github.ref_name }}) @ ${{ github.sha }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch or tag to deploy"
        required: true
        default: "main"

concurrency:
  group: azure-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || github.ref_name }}

      - name: Show revision to deploy
        run: |
          echo "event=${{ github.event_name }}"
          echo "selected_ref=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || github.ref_name }}"
          echo "branch_from_git=$(git rev-parse --abbrev-ref HEAD)"
          echo "commit=$(git rev-parse HEAD)"

      - name: Set up Python version
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.x'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size. 
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4.6.2
        with:
          name: python-app
          path: |
            .
            !antenv/

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4.3.0
        with:
          name: python-app

      - name: Verify artifact content
        run: |
          echo "artifact_commit_check=$(grep -nF 'Que trouverez vous ici ?' core/templates/home.html || true)"
          echo "artifact_home_preview:"
          sed -n '1,40p' core/templates/home.html

      - name: Parse publish profile metadata
        id: publish-profile
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["AZURE_WEBAPP_PUBLISH_PROFILE"])
          chosen = None
          for profile in root.findall('.//publishProfile'):
              publish_url = profile.attrib.get('publishUrl', '')
              if '.scm.' in publish_url:
                  chosen = profile
                  break

          if chosen is None:
              raise SystemExit('No SCM publish profile found in AZURE_WEBAPP_PUBLISH_PROFILE.')

          scm_url = chosen.attrib.get('publishUrl', '').strip()
          if not scm_url.startswith('http'):
              scm_url = f'https://{scm_url}'
          scm_url = scm_url.rstrip('/')

          app_url = chosen.attrib.get('destinationAppUrl', '').strip()
          if app_url and not app_url.startswith('http'):
              app_url = 'https://' + app_url.lstrip('/')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              username = chosen.attrib.get('userName', '')
              password = chosen.attrib.get('userPWD', '')
              print(f"scm_url={scm_url}", file=output)
              print(f"app_url={app_url}", file=output)
              print(f"user_b64={base64.b64encode(username.encode('utf-8')).decode('ascii')}", file=output)
              print(f"password_b64={base64.b64encode(password.encode('utf-8')).decode('ascii')}", file=output)
          PY

      - name: Create deploy marker
        run: |
          printf "%s\n" "${GITHUB_SHA}" > DEPLOY_SHA.txt
          printf "%s\n" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> DEPLOY_SHA.txt
          echo "deploy_marker:"
          cat DEPLOY_SHA.txt

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'unefaimdevie'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Validate deployment target
        run: |
          set -euo pipefail
          DEPLOYED_URL="${{ steps.deploy-to-webapp.outputs.webapp-url }}"
          PROFILE_APP_URL="${{ steps.publish-profile.outputs.app_url }}"
          echo "deployed_webapp_url=$DEPLOYED_URL"
          echo "profile_app_url=$PROFILE_APP_URL"
          if [ -n "$PROFILE_APP_URL" ] && [[ "$PROFILE_APP_URL" != *"unefaimdevie"* ]]; then
            echo "Error: publish profile points to a different app. Update AZURE_WEBAPP_PUBLISH_PROFILE."
            exit 1
          fi
          if [ -n "$DEPLOYED_URL" ] && [[ "$DEPLOYED_URL" != *"unefaimdevie"* ]]; then
            echo "Error: deployment target mismatch. Check AZURE_WEBAPP_PUBLISH_PROFILE secret."
            exit 1
          fi

      - name: Inspect deployed files via Kudu (diagnostic)
        env:
          SCM_URL: ${{ steps.publish-profile.outputs.scm_url }}
          SCM_USERNAME_B64: ${{ steps.publish-profile.outputs.user_b64 }}
          SCM_PASSWORD_B64: ${{ steps.publish-profile.outputs.password_b64 }}
        run: |
          USERNAME="$(printf '%s' "$SCM_USERNAME_B64" | base64 -d)"
          PASSWORD="$(printf '%s' "$SCM_PASSWORD_B64" | base64 -d)"

          echo "--- Kudu App Settings (SCM build flag) ---"
          curl -fsS -u "$USERNAME:$PASSWORD" "$SCM_URL/api/settings" 2>/dev/null \
            | python3 -c "import sys,json; s=json.load(sys.stdin); print('SCM_DO_BUILD_DURING_DEPLOYMENT:', s.get('SCM_DO_BUILD_DURING_DEPLOYMENT','(not set)'))" || true

          echo "--- Searching for template text in /home/site (via Kudu command API) ---"
          curl -fsS -u "$USERNAME:$PASSWORD" \
            -H 'Content-Type: application/json' \
            -d '{"command":"grep -rF \"Que trouverez vous ici ?\" /home/site/ 2>/dev/null | head -5 || echo NOT_FOUND","dir":"/home/site"}' \
            "$SCM_URL/api/command" 2>/dev/null | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('Output','(no output)'))" || true

          echo "--- DEPLOY_SHA in wwwroot ---"
          curl -fsS -u "$USERNAME:$PASSWORD" "$SCM_URL/api/vfs/site/wwwroot/DEPLOY_SHA.txt" 2>/dev/null || echo "(not found)"

          echo "--- home.html in wwwroot/core/templates ---"
          curl -fsS -u "$USERNAME:$PASSWORD" "$SCM_URL/api/vfs/site/wwwroot/core/templates/home.html" 2>/dev/null \
            | grep -iF 'trouverez\|la une' || echo "(not found or no matching line)"

      - name: Verify live homepage content
        run: |
          set -euo pipefail
          LIVE_URL="${{ steps.deploy-to-webapp.outputs.webapp-url }}"
          if [ -z "$LIVE_URL" ]; then
            LIVE_URL="${{ steps.publish-profile.outputs.app_url }}"
          fi
          LIVE_URL="${LIVE_URL%/}/"
          echo "live_url=$LIVE_URL"

          fetched=0
          for attempt in 1 2 3 4 5; do
            if curl -fsSL "$LIVE_URL" -o live_home.html 2>/dev/null; then
              fetched=1
              break
            fi
            echo "Live check attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

          if [ "$fetched" -eq 0 ]; then
            echo "Error: could not reach live site after 5 attempts."
            exit 1
          fi

          echo "live_home_match=$(grep -nF 'Que trouverez vous ici ?' live_home.html || true)"
          if ! grep -qF 'Que trouverez vous ici ?' live_home.html; then
            echo "Error: live site does not contain expected text after deployment."
            echo "(Oryx may be rebuilding from old code — check SCM_DO_BUILD_DURING_DEPLOYMENT in Azure App Settings)"
            exit 1
          fi
          echo "Live site verification passed."
          